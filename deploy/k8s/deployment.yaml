apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactive-lab
  labels: { app.kubernetes.io/name: interactive-lab }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: interactive-lab }
  template:
    metadata:
      labels: { app.kubernetes.io/name: interactive-lab }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: interactive-lab
          image: ghcr.io/mploschiavo/interactive-lab:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /index.html, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /index.html, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: cache, mountPath: /tmp }
            - { name: run, mountPath: /var/run }
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
