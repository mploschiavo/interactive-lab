# kubectl apply -f k8s.yaml   (microk8s / kubernetes)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactive-lab
  labels: { app: interactive-lab }
spec:
  replicas: 2
  selector:
    matchLabels: { app: interactive-lab }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: interactive-lab }
    spec:
      containers:
        - name: web
          image: harbor.iomio.io/library/interactive-lab:latest
          ports:
            - { name: http, containerPort: 80 }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: interactive-lab
spec:
  selector: { app: interactive-lab }
  ports:
    - { port: 80, targetPort: http }
