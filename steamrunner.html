<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SteamRunner — Kettle Logic Lab</title>
    <meta name="description" content="SteamRunner — time your jumps and keep the line moving. From the Kettle Logic interactive lab." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="lab-bar">
        <a class="lab-brand" href="./index.html"><b>Kettle</b> <span>Logic Lab</span></a>
        <a class="lab-back" href="./index.html">← all games</a>
      </header>

      <h1 style="margin: 1.4rem 0 0.2rem; font-size: clamp(1.6rem, 4vw, 2.2rem); letter-spacing: -0.02em;">SteamRunner</h1>
      <p style="margin: 0 0 1rem; color: var(--fg-dim);">Keep the line moving and time your jumps. Don’t stall the boiler.</p>

      <div class="hud">
        <span>Score <b id="game-score">0</b></span>
        <span>Level <b id="game-level">1</b></span>
        <span id="game-status">Ready</span>
      </div>

      <div class="stage">
        <canvas id="game-canvas" width="1200" height="720"></canvas>
        <div id="game-start-overlay" class="overlay">
          <button id="game-start-btn" class="btn" type="button">Start game</button>
          <p>Space / ↑ to jump · Enter to start · P pauses · R restarts.</p>
        </div>
        <div id="game-feedback"></div>
      </div>
      <p class="controls">Space / ↑ jump · Enter start · P pause · R restart</p>

      <section class="scores">
        <h2>Local high scores</h2>
        <ol id="game-leaderboard"></ol>
        <form id="score-form">
          <input id="score-name" placeholder="Your name" maxlength="12" aria-label="Your name" />
          <button id="score-submit" class="btn btn--ghost" type="submit">Save score</button>
        </form>
      </section>
    </div>
    <script src="./lab-common.js"></script>
    <script src="./steamrunner.js"></script>
  </body>
</html>
